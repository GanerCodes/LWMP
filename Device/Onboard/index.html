<!DOCTYPE html>
<html lang="en">
<head>
  <title>Lightwave Setup</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { font-size:20px; }
    button,input,dialog { font-size:unset; }
    button,input { transition: all 0.1s ease-in-out; }
    #confBar { margin: 1em;
               margin-bottom:1.7em; }
    ::backdrop { background:#000 ; }
    dialog     { background:#0000; border:0; }
    @keyframes popin { 0%   { transform:scale(0  ); }
                       90%  { transform:scale(1.1); }
                       100% { transform:scale(1  ); } }
    @keyframes fade { 0%   { opacity:0; }
                      100% { opacity:1; } }
    dialog[open],::backdrop { animation: fade 0.15s ease-in-out normal; }
    .entry { animation: popin 0.15s cubic-bezier(0.2,0.8,0.2,1) normal; }
    
    body { background:#000; padding: 1em; }
    body,#lw_setup[open] {
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      font-family:sans-serif; text-align:center;
      color:#FFF; }
    #modes { display:grid; grid-template-columns:repeat(auto-fill,125px);
             grid-gap:10px; justify-content:center; width:100%; }
    .item { width:75vw; margin-top:8px; margin-bottom:8px; }
    .text { text-align:center; }
    input::placeholder { color:#AAA; }
    button { border-radius:4px; }
    input,button { background:#111; color:#EEE;
                   border:1px solid #AAA; }
    input:focus, button:is(:hover,:focus-visible) {
      background:#222; color:#FFF;
      border:1px solid #FFF; outline:none; }
    .botBtns { width: 40%; }
    *:is(button,summary):is(:hover,:focus-visible) { cursor:pointer; }
    button:is(:hover,:focus-visible) { transform:scale(1.03); }
    button:active                    { background:#333; }
    .entry { aspect-ratio:1; border-radius:10px;
             overflow:hidden; overflow-wrap:anywhere;
             font-size: 0.9em; text-overflow:ellipsis; line-break:anywhere; }
    .entry:is(:hover,:focus-visible) { transform:scale(1.02) translateY(-3px); }
  </style>
</head>
<body>
  <t style="font-size:2em">LightWave</t>
  <dialog id="lw_setup">
    <t style="font-size:2em">WiFi Setup</t>
    <t style="margin-bottom:1.25em;font-size:0.75em;color:#AAA">All Fields Case Sensitive</t>
    <input type="text" class="item" id="SSID" placeholder="Router SSID">
    <input type="text" class="item" id="PASS" placeholder="Router Password">
    <input type="text" class="item" id="TOKE" placeholder="Account Token"
           title="(6-64 characters) Anyone with this token can control your LightWave">
    <details>
      <summary>Advanced</summary>
      <input type="text" class="item" id="WS_URL" title="Websocket URL" placeholder="Websocket URL">
      <input type="text" class="item" id="UD_URL" title="Update URL"    placeholder="Update URL">
    </details>
    <span class="item" style="margin-top:1.5em">
     <button class="botBtns" id="setup_cancel">Cancel</button>
     <button class="botBtns" id="setup_submit">Submit</button>
    </span>
  </dialog>
  <span id="confBar">
    <button id="setup_wifi">Setup WiFi</button>
  </span>
  <div id="modes"></div>
  
  <script>
    𝔇 = document;
    api = (m,j) => fetch(m, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(j)});
    
    setup_wifi  .onclick = _=>lw_setup.showModal();
    setup_submit.onclick = _=>{
      let C,S,P,T;
      C = [S,P,T] = [SSID,PASS,TOKE].map(x=>x.value);
      const l = [...T].length;
      if(!(C.every(x=>x) && 6<=l && l<=64)) return;
      const r = { R_SSID:C[0], R_PASS:C[1], TOKEN:C[2], AP_MODE:0,
                  ...(_=WS_URL.value) && {WS_URL    : _},
                  ...(_=UD_URL.value) && {UPDATE_URL: _} };
      api("/config",r);
      lw_setup.innerHTML = '<p class="text">Sent login info and restarted controller!<br><br>AP will be recreated in ≈30s if router connection fails.</p>'; };
    setup_cancel.onclick = _=>lw_setup.close();
    
    const populate = x => x.split(' ').forEach(m => {
      if(m.at(-1) == '_') return;
      const ə = 𝔇.createElement("button");
      ə.innerText = m; ə.className = "entry";
      ə.onclick = _ => {api("/mode",{mode:m})};
      modes.append(ə); });
    
    // api = (...𝔸) => (console.log("API:",...𝔸),{ json: _=>({WS_URL:"https://ws_url.com",UPDATE_URL:"https://update_url.com",R_SSID:"coolnet",modes :"_ap_ _default_ fade_test synctest thousand" }) });
    (async _ => {
      const ℭ = await (await api("/getConfig")).json();
      SSID  .value = ℭ.R_SSID     || '';
      PASS  .value = ℭ.R_PASS     || '';
      TOKE  .value = ℭ.TOKEN      || '';
      WS_URL.value = ℭ.WS_URL     || '';
      UD_URL.value = ℭ.UPDATE_URL || '';
      populate(ℭ.modes || ''); })();
  </script>
</body>
</html>
